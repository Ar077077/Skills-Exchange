{% extends 'base.html' %}
{% block title %}Log In — Skills Exchange{% endblock %}

{% block content %}
<section class="auth-page">
    <div class="auth-card">
        <h2>Welcome back</h2>
        <p>Log in to continue learning</p>
        <form method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Your username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Your password" required>
            </div>
            <button type="submit" class="btn-primary full-width">Log In</button>
        </form>
        <p class="auth-switch">Don't have an account? <a href="{{ url_for('signup') }}">Sign up</a></p>
    </div>
</section>
{% endblock %}
