{% extends 'base.html' %}
{% block title %}Sign Up — Skills Exchange{% endblock %}

{% block content %}
<section class="auth-page">
    <div class="auth-card">
        <h2>Join Skills Exchange</h2>
        <p>Create your free account</p>
        <form method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Create a password" required>
            </div>
            <button type="submit" class="btn-primary full-width">Create Account</button>
        </form>
        <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
    </div>
</section>
{% endblock %}
